<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swipe | Fast Payment Solutions</title>

    <!-- Standard Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicon/favicon-16x16.png"
    />
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico" />

    <!-- Apple Touch Icon (iOS Home Screen) -->
    <link rel="apple-touch-icon" href="assets/favicon/apple-touch-icon.png" />

    <!-- Android Chrome Icon -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="assets/favicon/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="assets/favicon/android-chrome-512x512.png"
    />

    <!-- Web Manifest (for Android/Chrome installation) -->
    <link rel="manifest" href="assets/favicon/site.webmanifest" />

    <!-- Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anek+Telugu:wght@100..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="general.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <img src="assets/logo-white.svg" alt="Swipe logo" />
      <ul class="menu">
        <li><a href="#">Products</a></li>
        <li><a href="#">Solutions</a></li>
        <li><a href="#">Developers</a></li>
        <li><a href="#">Resources</a></li>
        <li><a href="#">Pricing</a></li>
      </ul>
      <button class="primary-button navbar-button">Sign In</button>
    </nav>
    <main class="main">
      <section class="hero">
        <div class="section-container two-column">
          <div class="col-left">
            <h1>Payments infrastructure for the world</h1>
            <p>
              Lorem ipsum dolor sit, amet consectetur adipisicing elit. Ipsam
              eum, numquam perferendis eos beatae atque minima distinctio fuga
              voluptates.
            </p>
            <div class="button-container">
              <button class="primary-button with-icon">
                Start now
                <img
                  src="assets/arrow-right-light.svg"
                  alt="Arrow right icon"
                />
              </button>
              <button class="secondary-button with-icon">
                Contact sales
                <img
                  src="assets/arrow-right-purple.svg"
                  alt="Arrow right icon"
                />
              </button>
            </div>
          </div>
          <div class="col-right hero-phone-container">
            <img
              src="assets/hero-phone.png"
              class="hero-phone"
              alt="Mobile app dashboard"
            />
          </div>
        </div>
      </section>
      <section class="partners-section">
        <div class="section-container">
          <div class="partners-grid">
            <img src="assets/instacart.png" alt="instacart logo" />
            <img src="assets/salesforce.png" alt="salesforce logo" />
            <img src="assets/amazon.png" alt="amazon logo" />
            <img src="assets/slack.png" alt="slack logo" />
            <img src="assets/shopify.png" alt="shopify logo" />
            <img src="assets/google.png" alt="google logo" />
            <img src="assets/lyft.png" alt="lyft logo" />
            <img src="assets/zoom.png" alt="zoom logo" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
